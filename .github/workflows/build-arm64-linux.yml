# Builds a Linux ARM64 Flutter bundle (Debian 13 / Raspberry Pi 5) via cross-compile
# on ubuntu-latest, then publishes it to a GitHub Release.

name: Build Final Flutter App (linux arm6)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build_linux_arm64:
    name: Build Linux ARM64 (Debian 13 / Pi 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify Flutter project
        run: test -f pubspec.yaml

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: stable

      - name: Install Linux build dependencies and ARM64 cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake pkg-config clang \
            libgtk-3-dev libblkid-dev liblzma-dev zip \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Enable Linux desktop and precache ARM64 engine
        run: |
          flutter config --enable-linux-desktop
          flutter precache --linux

      - run: flutter pub get

      - name: Build Linux ARM64 release
        run: flutter build linux --release --target-platform linux-arm64

      - name: List Linux build directory
        run: ls -alh "${{ github.workspace }}/build/linux/arm64/release/bundle"

      - name: Zip Linux ARM64 build
        run: |
          cd "${{ github.workspace }}/build/linux/arm64/release/bundle"
          zip -r rdnbenet-linux-arm64.zip .

      - name: Upload Linux ARM64 build
        uses: actions/upload-artifact@v5
        with:
          name: linux-arm64-zip
          path: ${{ github.workspace }}/build/linux/arm64/release/bundle/rdnbenet-linux-arm64.zip

  upload-release:
    name: Publish GitHub Release
    needs: [build_linux_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//' | tr -d '\r')
          TAG="${VERSION//+/-}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux ARM64 ZIP
        uses: actions/download-artifact@v5
        with:
          name: linux-arm64-zip
          path: ./out/linux

      - name: List output directory
        run: ls -R ./out

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./out/linux/*
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
