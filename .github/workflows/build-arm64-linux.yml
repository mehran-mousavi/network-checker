# Builds a native Linux ARM64 Flutter bundle for Debian 13 / Raspberry Pi 5
# and publishes it to a GitHub Release tagged from pubspec.yaml version.
#
# Requires a public repo (or Team/Enterprise) for ubuntu-24.04-arm runners.
# Private repos on the free plan must use a self-hosted ARM runner or cross-compile.

name: Build Linux arm64 Flutter App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_linux_arm64:
    name: Build Linux ARM64 (Debian 13 / Pi 5)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake pkg-config clang \
            libgtk-3-dev libblkid-dev liblzma-dev zip

      - run: flutter pub get

      - name: Build Linux ARM64 release
        run: flutter build linux --release

      - name: List Linux build directory
        run: ls -alh "${{ github.workspace }}/build/linux/arm64/release/bundle"

      - name: Zip Linux ARM64 build
        run: |
          cd "${{ github.workspace }}/build/linux/arm64/release/bundle"
          zip -r rdnbenet-linux-arm64.zip .

      - name: Upload Linux ARM64 build
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-zip
          path: ${{ github.workspace }}/build/linux/arm64/release/bundle/rdnbenet-linux-arm64.zip

  upload-release:
    name: Publish GitHub Release
    needs: [build_linux_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//' | tr -d '\r')
          TAG="${VERSION//+/-}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux ARM64 ZIP
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-zip
          path: ./out/linux

      - name: List output directory
        run: ls -R ./out

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./out/linux/*
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
