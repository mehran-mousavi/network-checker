# Native Linux ARM64 Flutter build for Debian 13 / Raspberry Pi 5.
# Flutter does NOT support cross-build (x64 host -> arm64 target); must use an ARM runner.
# Public repos: ubuntu-24.04-arm. Private repos: use a self-hosted Pi 5 runner.

name: Build Final Flutter App (linux arm64)

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.38.5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build_linux_arm64:
    name: Build Linux ARM64 (Debian 13 / Pi 5)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Verify Flutter project
        run: test -f pubspec.yaml

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip xz-utils zip \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev libglu1-mesa-dev

      - name: Install Flutter SDK (git, ARM64-native)
        run: |
          set -euxo pipefail
          FLUTTER_ROOT="${RUNNER_TEMP}/flutter"
          git clone --depth 1 --branch "${FLUTTER_VERSION}" \
            https://github.com/flutter/flutter.git "${FLUTTER_ROOT}"
          echo "${FLUTTER_ROOT}/bin" >> "${GITHUB_PATH}"
          flutter --version

      - name: Prepare Flutter for Linux desktop
        run: |
          flutter config --enable-linux-desktop
          flutter doctor -v
          flutter precache --linux

      - run: flutter pub get

      - name: Build Linux ARM64 release (native)
        run: flutter build linux --release

      - name: List Linux build directory
        run: ls -alh "${{ github.workspace }}/build/linux/arm64/release/bundle"

      - name: Zip Linux ARM64 build
        run: |
          cd "${{ github.workspace }}/build/linux/arm64/release/bundle"
          zip -r rdnbenet-linux-arm64.zip .

      - name: Upload Linux ARM64 build
        uses: actions/upload-artifact@v5
        with:
          name: linux-arm64-zip
          path: ${{ github.workspace }}/build/linux/arm64/release/bundle/rdnbenet-linux-arm64.zip

  upload-release:
    name: Publish GitHub Release
    needs: [build_linux_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//' | tr -d '\r')
          TAG="${VERSION//+/-}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux ARM64 ZIP
        uses: actions/download-artifact@v5
        with:
          name: linux-arm64-zip
          path: ./out/linux

      - name: List output directory
        run: ls -R ./out

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./out/linux/*
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
